        :root { 
            --mello-blue: #5d87ff;

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {

            color: #e5e7eb; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif;

        .glass { 
            background: rgba(23, 28, 41, 0.96);

        }
        
        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            z-index: 5000; 
            background: rgba(11, 15, 26, 0.98);
            padding: 20px; 
            flex-direction: column; 
            overflow-y: auto;

        .modal.active { display: flex; }
        .view { display: none; padding-bottom: 140px; padding-bottom: calc(120px + env(safe-area-inset-bottom)); min-height: 100vh; }
        .view.active { display: block; animation: fadeIn 0.3s ease-out; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }

        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        input, textarea, select { 
            background: rgba(255,255,255,0.05) !important; 
            border: 1px solid rgba(255,255,255,0.1) !important; 
            color: white !important;
        }

        .carousel-container {
            display: flex;
            overflow-x: auto;
            gap: 16px;
            scroll-snap-type: x mandatory;
            padding: 10px 0;
        }
        
        .carousel-item {
            flex: 0 0 160px;
            scroll-snap-align: start;
        }

        .tab-active { 
            border-bottom: 2px solid #5d87ff;
            color: #5d87ff !important;

        .btn-primary {
            background: linear-gradient(135deg, #5d87ff, #3d67cf);
            transition: all 0.2s ease;

        .btn-primary:active { transform: scale(0.95); }

        nav button.active { color: #5d87ff; }

</head>

        </div>
        <button onclick="location.reload()" class="w-full py-4 bg-red-500/10 text-red-500 rounded-2xl font-bold text-sm">Logout Session</button>

<script>
// --- MELLOGRAM CORE ENGINE v10.9 (Persistent) ---
const app = {
    state: {
        user: { name: "Explorer", pts: 250, rank: "Citizen", avatar: "E" },
        posts: [
            { user: "MelloBot", content: "Welcome to v10.9! Your data is now saved locally.", time: "Just now" },
            { user: "System", content: "Persistence Layer: Online.", time: "1m ago" }
        ],
        store: [
            { name: "Double Points (1h)", cost: 150, icon: "zap" },
            { name: "Pro Badge", cost: 500, icon: "shield-check" },
            { name: "1GB Data", cost: 300, icon: "wifi" },
            { name: "Market Access", cost: 1000, icon: "trending-up" }
        ]
    },
    init() {
        this.load(); // Load saved data on startup
        this.renderFeed();
        this.renderStore();
        this.updateUI();
        window.addEventListener("hashchange", () => this.handleRouting());
        this.handleRouting();
    },
    save() {
        localStorage.setItem('mello_state', JSON.stringify(this.state.user));
    },
    load() {
        const saved = localStorage.getItem('mello_state');
        if (saved) this.state.user = JSON.parse(saved);
    },
    updateUI() {
        document.getElementById('header-pts').innerText = `${this.state.user.pts} PTS`;
        document.getElementById('stat-rank').innerText = this.state.user.rank;
        document.getElementById('user-avatar').innerText = this.state.user.avatar;
        document.getElementById('profile-name').innerText = this.state.user.name;
        lucide.createIcons();
    },
    handleRouting() {
        const hash = window.location.hash.replace("#", "") || "main-app";
        if (document.getElementById(hash)) this.navigate(hash);
    },
    navigate(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        const targetView = document.getElementById(viewId);
        if (targetView) targetView.classList.add('active');
        window.scrollTo(0, 0);
    },
    login(name = "User") {
        this.state.user.name = name;
        this.state.user.avatar = name.charAt(0).toUpperCase();
        this.save();
        document.getElementById('auth-view').classList.remove('active');
        document.getElementById('main-app').classList.add('active');
        document.getElementById('app-nav').classList.replace('hidden', 'flex');
        this.init();
    },
    buy(name, cost) {
        if(this.state.user.pts >= cost) {
            this.state.user.pts -= cost;
            this.save(); // Save after spending
            alert(`Acquired: ${name}`);
            this.updateUI();
        } else {
            alert("Insufficient Points");
        }
    },
    redeemVoucher() {
        const pin = document.getElementById('v-pin').value;
        if(pin.length < 5) return alert("Invalid PIN");
        this.state.user.pts += 500;
        this.save(); // Save after earning
        this.updateUI();
        alert("Voucher Validated! +500 PTS");
        document.getElementById('v-pin').value = "";
    },
    renderFeed() { /* same as before */ },
    renderStore() { /* same as before */ }
};
window.onload = () => { lucide.createIcons(); app.init(); };
</script>
