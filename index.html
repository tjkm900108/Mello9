<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mellogram v10.9 | Digital Economic Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --mello-blue: #5d87ff; --mello-bg: #0b0f1a; --mello-card: #171c29; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--mello-bg); color: #e5e7eb; font-family: system-ui, sans-serif; overflow-x: hidden; }
        
        .glass { background: rgba(23, 28, 41, 0.96); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .view { display: none; min-height: 100vh; padding-bottom: 120px; }
        .view.active { display: block; animation: fadeIn 0.3s ease-out; }
        
        /* Screenshot-inspired Service Cards */
        .service-card { 
            background: linear-gradient(145deg, rgba(23, 28, 41, 0.4), rgba(11, 15, 26, 0.8));
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        .service-icon-box {
            background: rgba(93, 135, 255, 0.1);
            width: 42px; height: 42px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px;
        }
        .badge-legit {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
            padding: 4px 10px;
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 99px;
            display: inline-block;
        }

        .modal { display: none; position: fixed; inset: 0; z-index: 5000; background: rgba(11, 15, 26, 0.98); padding: 20px; }
        .modal.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth-view" class="view active flex flex-col justify-center p-6">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black italic tracking-tighter">MELLO<span class="text-blue-500">GRAM</span></h1>
            <p class="text-[10px] uppercase tracking-widest opacity-50">v10.9 pty ltd products&services</p>
        </div>
        <div class="glass rounded-3xl p-6 space-y-4">
            <input type="text" id="login-name" placeholder="Enter Username" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none">
            <button onclick="app.login(document.getElementById('login-name').value)" class="w-full py-4 bg-blue-600 rounded-2xl font-black uppercase text-white shadow-lg shadow-blue-500/20">Access Portal</button>
        </div>
    </div>

    <div id="main-app" class="view">
        <header class="p-4 glass sticky top-0 z-50 flex justify-between items-center">
            <span class="font-black italic">MELLO<span class="text-blue-500">GRAM</span></span>
            <div id="header-pts" class="px-3 py-1 bg-blue-500/20 text-blue-400 rounded-full text-xs font-black">0 PTS</div>
        </header>
        <main class="p-4 space-y-6">
            <div class="grid grid-cols-2 gap-3">
                <div class="glass p-4 rounded-2xl border-l-4 border-blue-500"><p class="text-[10px] uppercase opacity-50">Rank</p><p id="stat-rank" class="font-black">--</p></div>
                <div class="glass p-4 rounded-2xl border-l-4 border-green-500"><p class="text-[10px] uppercase opacity-50">Daily</p><p class="font-black text-green-400">+12.5%</p></div>
            </div>
            
            <div id="global-feed" class="space-y-4"></div>
            
            <section id="services-main" class="mt-12 px-2">
                <div id="services-container" class="max-w-5xl mx-auto"></div>
            </section>
        </main>
    </div>

    <div id="store-view" class="view">
        <header class="p-4 glass sticky top-0 z-50"><h1 class="text-center font-black italic">MELLO<span class="text-blue-500">STORE</span></h1></header>
        <main class="p-4 space-y-6">
            <div class="glass p-6 rounded-3xl border-yellow-500/20">
                <p class="text-[10px] font-black uppercase text-yellow-500 mb-2">Voucher Terminal</p>
                <input type="text" id="v-pin" placeholder="PIN" class="w-full p-3 rounded-xl bg-white/5 border border-white/10 mb-3">
                <button onclick="app.redeemVoucher()" class="w-full py-3 bg-yellow-600 rounded-xl font-black text-xs uppercase">Credit Points</button>
            </div>
            <div id="store-grid" class="grid grid-cols-2 gap-4"></div>
        </main>
    </div>

    <nav id="app-nav" class="fixed bottom-0 w-full glass p-4 hidden justify-around items-center border-t border-white/10 z-[6000]">
        <button onclick="app.scrollToServices()" class="flex flex-col items-center gap-1 opacity-50 hover:opacity-100 text-lg">📊</button>
        <button onclick="app.navigate('main-app')" class="flex flex-col items-center gap-1 opacity-50 hover:opacity-100"><i data-lucide="home" class="w-5 h-5"></i></button>
        <button onclick="app.navigate('store-view')" class="flex flex-col items-center gap-1 opacity-50 hover:opacity-100"><i data-lucide="shopping-bag" class="w-5 h-5"></i></button>
        <button onclick="app.toggleModal('profile-modal', true)" class="flex flex-col items-center gap-1 opacity-50 hover:opacity-100"><i data-lucide="user" class="w-5 h-5"></i></button>
    </nav>

    <div id="profile-modal" class="modal">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-black">IDENTITY</h2>
            <button onclick="app.toggleModal('profile-modal', false)" class="p-2"><i data-lucide="x"></i></button>
        </div>
        <div class="glass p-10 rounded-[40px] text-center">
            <div id="user-avatar" class="w-16 h-16 bg-blue-600 rounded-full mx-auto mb-4 flex items-center justify-center text-2xl font-black">?</div>
            <h3 id="profile-name" class="text-xl font-black">---</h3>
            <button onclick="localStorage.clear(); location.reload();" class="mt-8 text-red-500 text-xs font-bold uppercase">Reset State</button>
        </div>
    </div>

<script>
const app = {
    state: {
        user: { name: "Explorer", pts: 250, rank: "Citizen", avatar: "E" },
        posts: [
            { user: "MelloBot", content: "Persistence layer active. Services migrated to Privacy Grid.", time: "Just now" },
            { user: "Founder", content: "Architecture update keitumetse modisenyane v10.9 live.", time: "2h ago" }
        ],
        store: [
            { name: "Pro Badge", cost: 500, icon: "shield-check" },
            { name: "Double Earn", cost: 150, icon: "zap" },
            { name: "Data Pack", cost: 300, icon: "wifi" }
        ],
        services: [
            { title: "MelloStore", icon: "shopping-cart", desc: "Access the marketplace in restricted digital zones." },
            { title: "SecureDrop", icon: "shield-check", desc: "Whistleblower-grade encrypted data submission." },
            { title: "MelloMail", icon: "mail", desc: "End-to-end encrypted communication protocol." },
            { title: "Voucher Bridge", icon: "zap", desc: "Convert network airtime into liquid points." },
            { title: "House Bank", icon: "landmark", desc: "Internal treasury for system stability." },
            { title: "Founder Sec", icon: "lock", desc: "Admin control and system protection." }
        ]
    },
    init() {
        this.load();
        this.renderFeed();
        this.renderStore();
        this.renderServices();
        this.updateUI();
        lucide.createIcons();
    },
    save() { localStorage.setItem('mello_state', JSON.stringify(this.state.user)); },
    load() {
        const saved = localStorage.getItem('mello_state');
        if (saved) this.state.user = JSON.parse(saved);
    },
    updateUI() {
        document.getElementById('header-pts').innerText = `${this.state.user.pts} PTS`;
        document.getElementById('stat-rank').innerText = this.state.user.rank;
        document.getElementById('user-avatar').innerText = this.state.user.avatar;
        document.getElementById('profile-name').innerText = this.state.user.name;
    },
    navigate(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    },
    toggleModal(id, show) {
        document.getElementById(id).classList.toggle('active', show);
    },
    scrollToServices() {
        this.navigate('main-app');
        setTimeout(() => {
            document.getElementById('services-main').scrollIntoView({ behavior: 'smooth' });
        }, 100);
    },
    login(name) {
        if(!name) return alert("Enter name");
        this.state.user.name = name;
        this.state.user.avatar = name[0].toUpperCase();
        this.save();
        document.getElementById('app-nav').classList.replace('hidden', 'flex');
        this.navigate('main-app');
        this.updateUI();
    },
    redeemVoucher() {
        this.state.user.pts += 500;
        this.save();
        this.updateUI();
        alert("Success! +500 PTS");
    },
    renderFeed() {
        document.getElementById('global-feed').innerHTML = this.state.posts.map(p => `
            <div class="glass p-4 rounded-2xl">
                <p class="text-[10px] font-black text-blue-400 mb-1">${p.user}</p>
                <p class="text-sm">${p.content}</p>
            </div>
        `).join('');
    },
    renderServices() {
        const container = document.getElementById('services-container');
        container.innerHTML = `
            <div class="flex flex-col items-center text-center mb-10">
                <span class="badge-legit mb-4">✓ Legitimate</span>
                <h2 class="text-3xl font-bold tracking-tight text-white">Privacy & Free Speech</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                ${this.state.services.map(s => `
                    <div class="service-card p-6 rounded-3xl flex flex-col gap-4">
                        <div class="service-icon-box">
                            <i data-lucide="${s.icon}" class="w-5 h-5 text-blue-400"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-100 mb-1">${s.title}</h3>
                            <p class="text-xs text-gray-500 font-medium leading-relaxed">${s.desc}</p>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
        lucide.createIcons();
    },
    renderStore() {
        document.getElementById('store-grid').innerHTML = this.state.store.map(i => `
            <div class="glass p-4 rounded-2xl text-center">
                <h4 class="text-[10px] font-black uppercase mb-2">${i.name}</h4>
                <p class="text-xs text-blue-500 mb-3">${i.cost} PTS</p>
                <button onclick="app.buy('${i.name}', ${i.cost})" class="w-full py-2 bg-white/5 rounded-lg text-[8px] font-black uppercase">Acquire</button>
            </div>
        `).join('');
    },
    buy(n, c) {
        if(this.state.user.pts >= c) {
            this.state.user.pts -= c;
            this.save();
            this.updateUI();
            alert("Purchased " + n);
        } else alert("Short on PTS");
    }
};
window.onload = () => app.init();
</script>
</body>
</html>
