<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mellogram v10.5 | Master Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --mello-blue: #5d87ff; --mello-bg: #0b0f1a; }
        body { background-color: var(--mello-bg); color: #e5e7eb; font-family: 'Inter', sans-serif; overflow-x: hidden; margin: 0; padding-bottom: 100px; }
        #map { height: 200px; width: 100%; filter: saturate(1.2) brightness(0.7); border-bottom: 2px solid var(--mello-blue); }
        .glass { background: rgba(23, 28, 41, 0.96); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .modal { display: none; position: fixed; inset: 0; z-index: 3000; background: rgba(2, 6, 23, 0.98); padding: 20px; flex-direction: column; overflow-y: auto; }
        .auth-screen { position: fixed; inset: 0; z-index: 4000; background: #0b0f1a; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .feed-container { max-height: 400px; overflow-y: auto; }
        .reaction-btn { transition: all 0.2s; cursor: pointer; }
        .reaction-btn:active { transform: scale(1.3); }
    </style>
</head>
<body>

    <div id="auth-layer" class="auth-screen">
        <div class="w-full max-w-sm glass p-8 rounded-3xl border border-blue-500/20 text-center">
            <h1 class="text-3xl font-black text-white italic mb-2">MELLO<span class="text-blue-500">9</span></h1>
            <p class="text-[8px] text-gray-500 uppercase tracking-widest mb-6 font-bold">© 2026 FOUNDER EDITION</p>
            <div id="auth-form" class="space-y-4">
                <input type="text" id="auth-user" placeholder="Node ID" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm outline-none text-white">
                <input type="password" id="auth-pass" placeholder="Access Key" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm outline-none text-white">
                <button onclick="handleAuth()" class="w-full py-4 bg-blue-600 rounded-xl font-black uppercase text-xs">Enter System</button>
                <p class="text-[10px] text-gray-500 cursor-pointer" onclick="toggleAuthMode()">Register Global ID</p>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="p-4 glass sticky top-0 z-[1000] flex justify-between items-center border-b border-blue-500/40">
            <div onclick="toggleModal('info-ui', true)"><h1 class="text-xl font-black italic">MELLO<span class="text-blue-500">9</span></h1></div>
            <div class="text-right">
                <div id="wallet-pts" class="text-blue-400 font-bold text-sm tracking-tighter">0 PTS</div>
                <div id="display-name" class="text-[8px] text-gray-500 uppercase font-bold tracking-widest">@USER</div>
            </div>
        </header>

        <div id="map"></div>

        <div class="p-4">
            <div class="glass p-5 rounded-3xl border-blue-500/30">
                <p class="text-[9px] text-gray-500 font-bold uppercase mb-3 text-center">Voucher Liquidity Node (20% Fee)</p>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="voucher-code" placeholder="Enter Airtime/Voucher" class="flex-1 bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-xs outline-none">
                    <button onclick="convertVoucher()" class="bg-green-600 px-6 py-3 rounded-xl font-black text-[10px] uppercase">MINT</button>
                </div>
                <div class="flex gap-2">
                    <button onclick="settle('Vodacom', '0825427103')" class="flex-1 py-3 bg-red-600 rounded-xl text-[9px] font-black uppercase">Voda Bridge</button>
                    <button onclick="settle('Capitec', '1886817349')" class="flex-1 py-3 bg-blue-600 rounded-xl text-[9px] font-black uppercase">Capitec Bridge</button>
                </div>
            </div>
        </div>

        <div class="px-4 pb-24">
            <div class="glass p-3 rounded-2xl flex gap-2 border border-white/5 mb-6">
                <input type="text" id="post-input" placeholder="Update network status..." class="flex-1 bg-transparent text-xs outline-none px-2 text-white">
                <button onclick="submitPost()" class="bg-blue-600 p-2 rounded-lg text-white"><i data-lucide="send" class="w-4 h-4"></i></button>
            </div>

            <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-4">Satellite Feed & Reactions</h2>
            <div id="post-feed" class="space-y-4"></div>
        </div>
    </div>

    <div id="info-ui" class="modal text-white">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-black italic">NODE <span class="text-blue-500">INTEL</span></h2>
            <button onclick="toggleModal('info-ui', false)" class="text-gray-500 text-xs font-bold border border-white/10 px-4 py-1 rounded-full">CLOSE</button>
        </div>
        <div id="user-profile" class="glass p-6 rounded-3xl border border-blue-500/30 mb-6"></div>
        <button onclick="openAdmin()" class="w-full py-4 bg-white/5 border border-white/10 rounded-2xl text-[10px] font-bold uppercase tracking-widest">Master Console (888)</button>
    </div>

    <footer id="footer-nav" class="fixed bottom-0 left-0 w-full glass border-t border-white/5 p-4 flex justify-around items-center z-[1001] hidden text-white">
        <div onclick="earn(100)"><i data-lucide="zap" class="w-5 h-5"></i></div>
        <div class="h-16 w-16 rounded-full bg-blue-600 flex items-center justify-center -mt-12 border-[6px] border-[#0b0f1a]" onclick="toggleModal('info-ui', true)">
            <i data-lucide="user" class="text-white w-6 h-6"></i>
        </div>
        <div onclick="alert('Store Redirecting...')"><i data-lucide="shopping-bag" class="w-5 h-5"></i></div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const DB = {
            get: () => JSON.parse(localStorage.getItem('mello_master_v10')) || { users: {}, posts: [] },
            save: (d) => localStorage.setItem('mello_master_v10', JSON.stringify(d))
        };

        let state = DB.get();
        let currentUser = null;
        let isReg = false;

        function handleAuth() {
            const u = document.getElementById('auth-user').value.toLowerCase();
            const p = document.getElementById('auth-pass').value;
            if(!u) return;
            if(isReg) {
                state.users[u] = { pass: p, pts: 1000, profile: { bio: "Network Member", joined: "2026" } };
                DB.save(state); toggleAuthMode();
            } else {
                if(state.users[u] && state.users[u].pass === p) { currentUser = u; launch(); }
                else if(u === 'founder' && p === '888') { state.users[u] = {pass:'888', pts:9999, profile: {bio: "FOUNDER NODE", joined: "2026"}}; currentUser=u; launch(); }
                else alert("Denied");
            }
        }

        function launch() {
            document.getElementById('auth-layer').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('footer-nav').classList.remove('hidden');
            document.getElementById('display-name').innerText = `@${currentUser}`;
            initMap(); refresh();
        }

        function refresh() {
            if(!currentUser) return;
            document.getElementById('wallet-pts').innerText = `${state.users[currentUser].pts.toLocaleString()} PTS`;
            
            // FEED REFRESH WITH REACTIONS
            const feed = document.getElementById('post-feed');
            feed.innerHTML = state.posts.slice().reverse().map((p, idx) => `
                <div class="p-4 glass rounded-2xl border border-white/5 shadow-xl">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] font-black text-blue-500 uppercase tracking-tighter">@${p.user}</span>
                        <span class="text-[8px] text-gray-600 font-bold uppercase">Signal Verified</span>
                    </div>
                    <p class="text-xs text-gray-200 leading-relaxed mb-4">${p.msg}</p>
                    <div class="flex gap-4 border-t border-white/5 pt-3">
                        <div onclick="react(${state.posts.length - 1 - idx}, 'like')" class="reaction-btn flex items-center gap-1">
                            <i data-lucide="heart" class="w-3 h-3 text-red-500"></i>
                            <span class="text-[9px] font-bold">${p.likes || 0}</span>
                        </div>
                        <div class="flex items-center gap-1 opacity-50">
                            <i data-lucide="message-circle" class="w-3 h-3"></i>
                            <span class="text-[9px]">0</span>
                        </div>
                    </div>
                </div>
            `).join('');

            // PROFILE REFRESH
            const prof = document.getElementById('user-profile');
            const uData = state.users[currentUser];
            prof.innerHTML = `<h3 class="text-2xl font-black italic uppercase">@${currentUser}</h3><p class="text-xs text-blue-400 font-bold mb-4 uppercase tracking-widest">${uData.profile.bio}</p><div class="text-[10px] space-y-1 opacity-60 uppercase font-bold"><div>MEMBER SINCE: ${uData.profile.joined}</div><div>NODE: VREDEFORT_01</div></div>`;
            
            DB.save(state); lucide.createIcons();
        }

        function react(postIdx, type) {
            if(!state.posts[postIdx].likes) state.posts[postIdx].likes = 0;
            state.posts[postIdx].likes++;
            earn(5); // Reward for reacting
            refresh();
        }

        function convertVoucher() {
            const code = document.getElementById('voucher-code').value;
            if(code.length < 5) return alert("Invalid Code");
            const rawVal = 1000; // Assume R10 voucher
            const fee = rawVal * 0.20; // 20% Fee logic
            const final = rawVal - fee;
            state.users[currentUser].pts += final;
            alert(`MINT SUCCESS\nRaw: ${rawVal} PTS\nHouse Fee (20%): -${fee}\nNet: ${final} PTS`);
            document.getElementById('voucher-code').value = ''; refresh();
        }

        function initMap() {
            const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-27.01, 27.49], 12);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        }

        function submitPost() {
            const m = document.getElementById('post-input').value;
            if(!m) return;
            state.posts.push({ user: currentUser, msg: m, likes: 0 });
            document.getElementById('post-input').value = ''; earn(10); refresh();
        }

        function earn(n) { state.users[currentUser].pts += n; refresh(); }
        function settle(m, a) { alert(`BRIDGE: ${m} to ${a} pending.`); }
        function toggleAuthMode() { isReg = !isReg; document.querySelector('#auth-form button').innerText = isReg ? 'Register ID' : 'Enter System'; }
        function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }
    </script>
</body>
</html>
