<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mellogram v10.8 | Founder Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --mello-blue: #5d87ff; --mello-bg: #0b0f1a; }
        body { background-color: var(--mello-bg); color: #e5e7eb; font-family: sans-serif; margin: 0; padding-bottom: 100px; }
        .glass { background: rgba(23, 28, 41, 0.96); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .modal { display: none; position: fixed; inset: 0; z-index: 5000; background: #0b0f1a; padding: 20px; flex-direction: column; overflow-y: auto; }
        #map { height: 180px; width: 100%; filter: saturate(1.2) brightness(0.6); }
        .store-card { transition: transform 0.2s; border: 1px solid rgba(255,255,255,0.05); }
        .store-card:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="main-app">
        <header class="p-4 glass sticky top-0 z-[1000] flex justify-between items-center border-b border-blue-500/40">
            <h1 class="text-xl font-black italic">MELLO<span class="text-blue-500">9</span></h1>
            <div id="wallet-pts" class="text-blue-400 font-bold text-sm">0 PTS</div>
        </header>

        <div id="map"></div>
        
        <main id="feed-view" class="p-4 space-y-4">
             <div class="glass p-5 rounded-3xl text-center border-blue-500/20">
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Network Status</p>
                <h2 class="text-sm font-black italic text-blue-400">VREDEFORT NODE ACTIVE</h2>
             </div>
        </main>
    </div>

    <div id="store-ui" class="modal">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black italic text-white">MINT <span class="text-blue-500">STORE</span></h2>
            <button onclick="toggleModal('store-ui', false)" class="p-2 glass rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>

        <div class="flex gap-2 overflow-x-auto pb-4 no-scrollbar">
            <button onclick="filterStore('Groceries')" class="px-4 py-2 glass rounded-xl text-[10px] font-black uppercase whitespace-nowrap">Groceries</button>
            <button onclick="filterStore('Tech')" class="px-4 py-2 glass rounded-xl text-[10px] font-black uppercase whitespace-nowrap">Tech</button>
            <button onclick="filterStore('Clothing')" class="px-4 py-2 glass rounded-xl text-[10px] font-black uppercase whitespace-nowrap">Clothing</button>
            <button onclick="filterStore('Tickets')" class="px-4 py-2 glass rounded-xl text-[10px] font-black uppercase whitespace-nowrap">Tickets</button>
        </div>

        <div id="store-grid" class="grid grid-cols-2 gap-3 pb-20">
            </div>
    </div>

    <div id="checkout-ui" class="modal">
        <h2 class="text-xl font-black mb-6 uppercase">Order Dispatch</h2>
        <div class="space-y-4">
            <div id="order-summary" class="p-4 glass rounded-2xl border-blue-500/30"></div>
            <input type="text" id="cust-name" placeholder="Full Name" class="w-full bg-white/5 p-4 rounded-xl outline-none border border-white/10">
            <input type="text" id="cust-contact" placeholder="WhatsApp / Cell Number" class="w-full bg-white/5 p-4 rounded-xl outline-none border border-white/10">
            <textarea id="cust-loc" placeholder="Delivery Address (Vredefort)" class="w-full bg-white/5 p-4 rounded-xl outline-none border border-white/10 h-24"></textarea>
            <button onclick="confirmOrder()" class="w-full py-4 bg-blue-600 rounded-2xl font-black uppercase">Confirm Order (-20% House Fee)</button>
            <button onclick="toggleModal('checkout-ui', false)" class="w-full py-2 text-gray-500 text-xs font-bold uppercase">Cancel</button>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full glass p-4 flex justify-around items-center z-[1001] border-t border-white/10">
        <div onclick="location.reload()"><i data-lucide="home" class="w-5 h-5 text-gray-500"></i></div>
        <div class="h-16 w-16 rounded-full bg-blue-600 flex items-center justify-center -mt-12 border-[6px] border-[#0b0f1a] shadow-2xl" onclick="toggleModal('store-ui', true)">
            <i data-lucide="shopping-cart" class="text-white w-6 h-6"></i>
        </div>
        <div onclick="toggleModal('info-ui', true)"><i data-lucide="user" class="w-5 h-5 text-gray-500"></i></div>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const products = [
            { id: 1, name: "Bulk Maize", cat: "Groceries", price: 150, img: "🌽" },
            { id: 2, name: "Smart Node v1", cat: "Tech", price: 2500, img: "📱" },
            { id: 3, name: "Founder Tee", cat: "Clothing", price: 350, img: "👕" },
            { id: 4, name: "Vredefort Bash", cat: "Tickets", price: 100, img: "🎟️" }
        ];

        let cart = null;

        function filterStore(cat) {
            const grid = document.getElementById('store-grid');
            const items = products.filter(p => p.cat === cat);
            grid.innerHTML = items.map(p => `
                <div class="store-card glass p-4 rounded-2xl text-center" onclick="openCheckout(${p.id})">
                    <div class="text-3xl mb-2">${p.img}</div>
                    <h3 class="text-[10px] font-black uppercase text-white">${p.name}</h3>
                    <p class="text-blue-400 font-bold text-xs mt-1">${p.price} PTS</p>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function openCheckout(id) {
            cart = products.find(p => p.id === id);
            document.getElementById('order-summary').innerHTML = `<p class="text-xs uppercase font-bold">Item: ${cart.name}</p><p class="text-blue-500 font-black">Price: ${cart.price} PTS</p>`;
            toggleModal('checkout-ui', true);
        }

        function confirmOrder() {
            const name = document.getElementById('cust-name').value;
            const contact = document.getElementById('cust-contact').value;
            if(!name || !contact) return alert("Missing Details");
            
            alert(`ORDER DISPATCHED!\nFounder: ${name}\nContact: ${contact}\nItem: ${cart.name}\n\nSystem is calculating 20% Logistics Fee...`);
            toggleModal('checkout-ui', false);
            toggleModal('store-ui', false);
        }

        function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }
        
        // Init
        window.onload = () => { 
            var map = L.map('map', {zoomControl: false}).setView([-27.01, 27.49], 12);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
            filterStore('Groceries');
            lucide.createIcons();
        };
    </script>
</body>
</html>
