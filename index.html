<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mellogram v10.3 | Founder & Bridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --mello-blue: #5d87ff; --mello-bg: #0b0f1a; }
        body { background-color: var(--mello-bg); color: #e5e7eb; font-family: 'Inter', sans-serif; overflow-x: hidden; margin: 0; padding-bottom: 100px; }
        #map { height: 220px; width: 100%; filter: saturate(1.2) brightness(0.7); border-bottom: 2px solid var(--mello-blue); }
        .glass { background: rgba(23, 28, 41, 0.96); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .modal { display: none; position: fixed; inset: 0; z-index: 3000; background: rgba(2, 6, 23, 0.98); padding: 20px; flex-direction: column; overflow-y: auto; }
        .auth-screen { position: fixed; inset: 0; z-index: 4000; background: #0b0f1a; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .feed-container { max-height: 250px; overflow-y: auto; }
        .founder-tag { background: linear-gradient(90deg, #5d87ff, #b45309); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <div id="auth-layer" class="auth-screen">
        <div class="w-full max-w-sm glass p-8 rounded-3xl border border-blue-500/20 text-center">
            <h1 class="text-3xl font-black text-white italic mb-2">MELLO<span class="text-blue-500">9</span></h1>
            <p class="text-[8px] text-gray-500 uppercase tracking-widest mb-6 font-bold">© 2026 KEITUMETSE MODISENYANE</p>
            <div id="auth-form" class="space-y-4 text-left">
                <input type="text" id="auth-user" placeholder="Node ID" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm outline-none text-white">
                <input type="password" id="auth-pass" placeholder="Access Key" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm outline-none text-white">
                <button onclick="handleAuth()" class="w-full py-4 bg-blue-600 rounded-xl font-black uppercase text-xs">Enter System</button>
                <p class="text-[10px] text-center text-gray-500 cursor-pointer" onclick="toggleAuthMode()">Register Global ID</p>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="p-4 glass sticky top-0 z-[1000] flex justify-between items-center border-b border-blue-500/40">
            <div onclick="toggleModal('info-ui', true)"><h1 class="text-xl font-black italic">MELLO<span class="text-blue-500">9</span></h1></div>
            <div class="text-right">
                <div id="wallet-pts" class="text-blue-400 font-bold text-sm">0 PTS</div>
                <div id="display-name" class="text-[8px] text-gray-500 uppercase font-bold tracking-widest">@USER</div>
            </div>
        </header>

        <div id="map"></div>

        <div class="p-4">
            <div class="glass p-5 rounded-3xl border-blue-500/30">
                <p class="text-[9px] text-gray-500 font-bold uppercase mb-3 text-center tracking-widest">House Bank Settlement</p>
                <div class="flex gap-2">
                    <button onclick="settle('Vodacom', '0825427103')" class="flex-1 py-4 bg-red-600 rounded-2xl text-[9px] font-black uppercase">VodaPay Bridge</button>
                    <button onclick="settle('Capitec', '1886817349')" class="flex-1 py-4 bg-blue-600 rounded-2xl text-[9px] font-black uppercase">Capitec Bridge</button>
                </div>
            </div>
        </div>

        <div class="p-4 pt-0">
            <div class="glass p-3 rounded-2xl flex gap-2 border border-white/5 shadow-lg">
                <input type="text" id="post-input" placeholder="Broadcast to network..." class="flex-1 bg-transparent text-xs outline-none px-2 text-white">
                <button onclick="submitPost()" class="bg-blue-600 p-2 rounded-lg"><i data-lucide="rss" class="w-4 h-4 text-white"></i></button>
            </div>
        </div>

        <section class="px-4 mb-6">
            <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-3">Merchant Vault</h2>
            <div id="merchant-grid" class="grid grid-cols-1 gap-3 text-white"></div>
        </section>

        <section class="px-4 mb-6">
            <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-3">Satellite Feed</h2>
            <div id="post-feed" class="feed-container space-y-3"></div>
        </section>
    </div>

    <div id="info-ui" class="modal">
        <div class="flex justify-between items-center mb-8 text-white">
            <h2 class="text-xl font-black italic">NODE <span class="text-blue-500">INTEL</span></h2>
            <button onclick="toggleModal('info-ui', false)" class="text-gray-500 text-xs font-bold border border-white/10 px-4 py-1 rounded-full">CLOSE</button>
        </div>
        <div class="space-y-6">
            <div class="p-6 glass rounded-3xl border border-blue-500/30 text-white">
                <p class="text-[10px] text-blue-400 font-bold uppercase mb-2 tracking-[0.3em]">Founder & IP Owner</p>
                <h3 class="text-2xl font-black founder-tag mb-1 uppercase">Keitumetse Modisenyane</h3>
                <div class="space-y-3 text-[11px] font-mono pt-4 border-t border-white/10 mt-2">
                    <div class="flex justify-between"><span class="text-gray-500 italic">WALLET:</span> <span class="text-white font-bold">082 542 7103</span></div>
                    <div class="flex justify-between"><span class="text-gray-500 italic">BANK:</span> <span class="text-white font-bold">1886817349</span></div>
                </div>
            </div>
            <button onclick="openAdmin()" class="w-full py-4 bg-white/5 border border-white/10 rounded-2xl text-[10px] text-white font-bold uppercase">Master Console (888)</button>
        </div>
    </div>

    <footer id="footer-nav" class="fixed bottom-0 left-0 w-full glass border-t border-white/5 p-4 flex justify-around items-center z-[1001] hidden text-white">
        <div onclick="earn(100)"><i data-lucide="zap" class="w-5 h-5"></i></div>
        <div class="h-16 w-16 rounded-full bg-blue-600 flex items-center justify-center -mt-12 border-[6px] border-[#0b0f1a]" onclick="earn(500)">
            <i data-lucide="plus" class="text-white w-8 h-8"></i>
        </div>
        <div onclick="toggleModal('info-ui', true)"><i data-lucide="info" class="w-5 h-5"></i></div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const DB = {
            get: () => JSON.parse(localStorage.getItem('mello9_final')) || { users: {}, merchantItems: [], posts: [] },
            save: (d) => localStorage.setItem('mello9_final', JSON.stringify(d))
        };

        let state = DB.get();
        let currentUser = null;
        let isReg = false;
        let map;

        function handleAuth() {
            const u = document.getElementById('auth-user').value.toLowerCase();
            const p = document.getElementById('auth-pass').value;
            if(!u) return;
            if(isReg) {
                state.users[u] = { pass: p, pts: 3000 }; DB.save(state); toggleAuthMode();
            } else {
                if(state.users[u] && state.users[u].pass === p) { currentUser = u; launch(); }
                else if(u === 'founder' && p === '888') { state.users[u] = {pass: '888', pts: 99999}; currentUser = u; launch(); }
                else alert("Access Denied");
            }
        }

        function launch() {
            document.getElementById('auth-layer').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('footer-nav').classList.remove('hidden');
            document.getElementById('display-name').innerText = `@${currentUser}`;
            initMap(); refresh();
        }

        function refresh() {
            if(!currentUser) return;
            document.getElementById('wallet-pts').innerText = `${state.users[currentUser].pts.toLocaleString()} PTS`;
            const mGrid = document.getElementById('merchant-grid');
            mGrid.innerHTML = state.merchantItems.map(i => `
                <div class="p-4 glass rounded-2xl flex justify-between items-center border-l-4 border-yellow-500 mb-2">
                    <div><h3 class="text-xs font-black italic uppercase">${i.name}</h3></div>
                    <button class="bg-yellow-500 text-black px-4 py-2 rounded-lg text-[10px] font-black">${i.price} P</button>
                </div>
            `).join('');
            const feed = document.getElementById('post-feed');
            feed.innerHTML = state.posts.slice().reverse().map(p => `
                <div class="p-3 glass rounded-xl border border-white/5 mb-2"><div class="flex justify-between mb-1"><span class="text-[9px] font-black text-blue-400">@${p.user}</span></div><p class="text-[11px] text-gray-300">${p.msg}</p></div>
            `).join('');
            DB.save(state); lucide.createIcons();
        }

        function settle(method, acc) {
            alert(`SETTLEMENT INITIATED\nTarget: ${method}\nAccount: ${acc}\nStatus: Verified Founder Bridge.`);
        }

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-27.01, 27.49], 12);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        }

        function submitPost() {
            const m = document.getElementById('post-input').value;
            if(!m) return;
            state.posts.push({ user: currentUser, msg: m });
            document.getElementById('post-input').value = ''; refresh();
        }

        function openAdmin() {
            if(prompt("MASTER KEY:") === "888") {
                const n = prompt("Asset Name:"); const p = parseInt(prompt("Price:"));
                if(n && p) { state.merchantItems.push({id: Date.now(), name: n, price: p}); refresh(); }
            }
        }

        function toggleAuthMode() { isReg = !isReg; document.querySelector('#auth-form button').innerText = isReg ? 'Register ID' : 'Enter System'; }
        function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }
        function earn(n) { state.users[currentUser].pts += n; refresh(); }
    </script>
</body>
</html>
