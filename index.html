<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MELLO v10.0 | FOUNDER NODE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f1a; color: #e5e7eb; font-family: sans-serif; margin: 0; padding: 0; }
        .glass { background: rgba(23, 28, 41, 0.95); border: 1px solid rgba(255,255,255,0.1); }
        .btn-main { background: #5d87ff; color: white; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .status-pulse { height: 8px; width: 8px; background: #10b981; border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="flex flex-col min-h-screen p-4">

    <header class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-black italic text-white">MELLO<span class="text-blue-500">9</span></h1>
        <div class="text-right">
            <span class="status-pulse"></span>
            <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Node: Vredefort</span>
        </div>
    </header>

    <main class="flex-1 space-y-6">
        
        <div class="glass p-6 rounded-[2rem] text-center border-blue-500/30">
            <p class="text-[10px] text-blue-400 font-bold uppercase mb-1">House Treasury Balance</p>
            <h2 id="balance" class="text-5xl font-black text-white">15,000</h2>
            <p class="text-blue-500 font-bold text-sm">PTS</p>
            <div class="mt-2 text-xs text-gray-500 italic">Est: R150.00</div>
        </div>

        <div class="space-y-3">
            <h3 class="text-[10px] text-gray-500 font-bold uppercase ml-2 mb-2">Direct Liquidity Bridge</h3>
            
            <button onclick="settle('Vodacom Wallet', '0825427103')" class="w-full py-5 bg-red-600 rounded-2xl flex flex-col items-center justify-center shadow-lg">
                <span class="text-[10px] font-black uppercase">Settle to Vodacom Wallet</span>
                <span class="text-xs font-bold opacity-80">082 542 7103</span>
            </button>

            <button onclick="settle('Capitec Bank', '1886817349')" class="w-full py-5 bg-blue-600 rounded-2xl flex flex-col items-center justify-center shadow-lg">
                <span class="text-[10px] font-black uppercase">Settle to Capitec Bank</span>
                <span class="text-xs font-bold opacity-80">1886817349</span>
            </button>
        </div>

        <div id="receipt-box" class="hidden glass p-4 rounded-2xl border-green-500/30">
            <div class="flex justify-between items-center mb-2">
                <span class="text-[10px] font-bold text-green-500 uppercase">Settlement Receipt</span>
                <button onclick="copyReceipt()" class="text-[10px] text-blue-400 font-bold">COPY</button>
            </div>
            <pre id="receipt-text" class="text-[10px] font-mono text-gray-400 whitespace-pre-wrap leading-tight"></pre>
        </div>

    </main>

    <footer class="mt-auto py-6 text-center">
        <p class="text-[9px] text-gray-600 font-bold uppercase tracking-[0.2em]">Founder: Keitumetse Modisenyane</p>
    </footer>

    <script>
        function settle(method, account) {
            const bal = document.getElementById('balance').innerText.replace(',','');
            const rand = (parseInt(bal) / 100).toFixed(2);
            const ref = 'ML9-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            
            const receipt = `MELLOGRAM SETTLEMENT\nREF: ${ref}\nTO: ${method}\nACC: ${account}\nVAL: R${rand}\nSTATUS: DISBURSED`;
            
            document.getElementById('receipt-text').innerText = receipt;
            document.getElementById('receipt-box').classList.remove('hidden');
            document.getElementById('balance').innerText = "0";
            alert("Settlement Bridge Triggered Successfully.");
        }

        function copyReceipt() {
            const t = document.getElementById('receipt-text').innerText;
            navigator.clipboard.writeText(t);
            alert("Copied.");
        }
    </script>
</body>
</html>
